[build]
  publish = "dist"
  functions = "netlify/functions"
  command = "npm install && cp -r public dist"

[build.environment]
  NODE_VERSION = "20"

# API routes — proxy to serverless functions (before SPA catch-all)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all — must come AFTER API routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]
